name: U-DiffPlan
channels:
  - defaults
dependencies:
  - python=3.8
  - setuptools
  - wheel
  - cython
  - pip
  - pip:
      - numpy==1.19.5
      - scipy==1.5.4
      - torch==1.13.1
      - torchvision==0.14.1
      - casadi==3.6.7
      - gym==0.26.2
      - matplotlib==3.3.4
      - scikit-learn==1.2.1
      - pandas==1.3.4
      - opencv-python==4.7.0.72
      - pillow==10.4.0
      - pyyaml==6.0.2
      - tqdm==4.65.0
      - pykalman==0.9.5
      - imageio==2.31.1

# NOTE: acados must be installed separately.
#   1. git clone https://github.com/acados/acados.git
#   2. Follow build instructions: https://docs.acados.org/installation/
#   3. pip install -e <acados_root>/interfaces/acados_template
